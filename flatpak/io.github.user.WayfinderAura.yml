# Flatpak manifest for Wayfinder Aura
# 
# Quick test build:
#   flatpak-builder --user --install --force-clean build-dir io.github.user.WayfinderAura.yml
#
# For Flathub submission:
#   1. Fork this repo and update app-id to your organization
#   2. Generate python-deps.json with flatpak-pip-generator
#   3. Verify all SHA256 hashes match
#   4. Submit PR to flathub/flathub
#
# App ID Guidelines:
#   - For personal projects: io.github.YOURUSERNAME.WayfinderAura
#   - For organization: com.yourorg.WayfinderAura
#   - Update all references below when changing

app-id: io.github.user.WayfinderAura
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: wayfinder-aura

finish-args:
  # Display - Wayland preferred, X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  
  # Audio recording (PipeWire/PulseAudio) - essential for voice dictation
  - --socket=pulseaudio
  
  # D-Bus for system integration
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  - --talk-name=org.freedesktop.portal.RemoteDesktop
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.gnome.SessionManager
  
  # App config and cache storage
  - --filesystem=xdg-config/wayfinder-aura:create
  - --filesystem=xdg-cache/wayfinder-aura:create
  
  # Whisper model access (user's existing models)
  - --filesystem=~/.local/share/whisper.cpp:ro
  - --filesystem=~/whisper.cpp/models:ro
  
  # LLM model access (user's downloaded models for post-processing)
  - --filesystem=~/.local/share/wayfinder-aura/llm-models:create
  
  # GPU acceleration (Vulkan for whisper.cpp and llama.cpp)
  - --device=dri
  
  # Network for API-based transcription (OpenAI, Groq) and model downloads
  - --share=network

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'
  - /lib/python*/site-packages/pip*
  - /lib/python*/site-packages/setuptools*
  - /lib/python*/site-packages/wheel*

modules:
  # PortAudio for sounddevice
  - name: portaudio
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
        sha256: 5af29ba58bbdbb7bbcefaaecc77ec8fc413f0db6f4c4e286c40c8c405c8d64db

  # whisper.cpp - The transcription engine
  - name: whisper-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DWHISPER_BUILD_EXAMPLES=ON
      - -DWHISPER_BUILD_TESTS=OFF
      - -DBUILD_SHARED_LIBS=OFF
      # Generic CPU baseline: Steam Deck APU (Zen 2) lacks AVX-512; a -march=native
      # build SIGILLs on it (STEAMDECK-INSTALL-LOG.md Crit-Finding 2 / Issue 13).
      - -DGGML_NATIVE=OFF
      - -DGGML_AVX512=OFF
      # Vulkan GPU support
      - -DGGML_VULKAN=ON
    sources:
      - type: git
        url: https://github.com/ggerganov/whisper.cpp.git
        tag: v1.7.2
    post-install:
      - install -Dm755 bin/whisper-cli ${FLATPAK_DEST}/bin/whisper-cli

  # Bundled whisper model: base.en — the right default for Steam-Deck-class CPU
  # (~141 MB, ~2x real-time on the Zen 2 APU; large-v3-turbo is unusable there —
  # STEAMDECK-INSTALL-LOG.md Issues 11/17). Users can download larger models in-app.
  - name: whisper-model-base
    buildsystem: simple
    build-commands:
      - install -Dm644 ggml-base.en.bin ${FLATPAK_DEST}/share/whisper-models/ggml-base.en.bin
    sources:
      - type: file
        url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
        sha256: a03779c86df3323075f5e796cb2ce5029f00ec8869eee3fdfb897afe36c6d002
        dest-filename: ggml-base.en.bin

  # llama.cpp - LLM inference engine for post-processing
  - name: llama-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      # EXAMPLES=ON so llama-cli is built — postprocessor.py prefers the CLI backend.
      - -DLLAMA_BUILD_EXAMPLES=ON
      - -DLLAMA_BUILD_TESTS=OFF
      - -DLLAMA_BUILD_SERVER=OFF
      - -DBUILD_SHARED_LIBS=ON
      # Generic CPU baseline (Zen 2 / Steam Deck has no AVX-512 — avoid SIGILL).
      - -DGGML_NATIVE=OFF
      - -DGGML_AVX512=OFF
      # Vulkan GPU support (works on AMD + NVIDIA + Intel)
      - -DGGML_VULKAN=ON
    sources:
      - type: git
        url: https://github.com/ggerganov/llama.cpp.git
        tag: b4568
    post-install:
      # cmake install handles most of this; these are defensive copies in case the pinned
      # tag's install rules miss the prefix. Verify exact paths during the on-Deck build.
      - install -Dm755 bin/llama-cli ${FLATPAK_DEST}/bin/llama-cli || find . -name llama-cli -type f -perm -u+x -exec install -Dm755 {} ${FLATPAK_DEST}/bin/llama-cli \; || true
      - find . -name 'libllama.so*' -exec install -Dm755 {} ${FLATPAK_DEST}/lib/ \; || true
      - find . -name 'libggml*.so*' -exec install -Dm755 {} ${FLATPAK_DEST}/lib/ \; || true

  # Bundled LLM model for post-processing: Qwen3.5-2B Q4_K_M (upgraded from
  # Qwen2.5-1.5B, Mar 2026). ~1.28 GB. Post-processing is optional/off by default
  # on Steam Deck; this lets it work out-of-the-box on capable hardware.
  - name: llm-model-qwen
    buildsystem: simple
    build-commands:
      - install -Dm644 Qwen3.5-2B-Q4_K_M.gguf ${FLATPAK_DEST}/share/llm-models/Qwen3.5-2B-Q4_K_M.gguf
    sources:
      - type: file
        url: https://huggingface.co/unsloth/Qwen3.5-2B-GGUF/resolve/main/Qwen3.5-2B-Q4_K_M.gguf
        sha256: aaf42c8b7c3cab2bf3d69c355048d4a0ee9973d48f16c731c0520ee914699223
        dest-filename: Qwen3.5-2B-Q4_K_M.gguf

  # wtype for Wayland text injection
  - name: wtype
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/atx/wtype.git
        tag: v0.4

  # ydotool for Wayland/X11 text injection (uinput-based fallback; needs /dev/uinput
  # or a ydotoold socket at runtime — see injector readiness handling).
  - name: ydotool
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/ReimuNotMoe/ydotool.git
        tag: v1.0.4

  # xdotool — injector's preferred X11 backend. The host binary is invisible inside the
  # sandbox, so build it here. X11 dev libs (Xtst/Xext/xkbcommon) come from the SDK.
  - name: xdotool
    buildsystem: simple
    build-commands:
      - make PREFIX=${FLATPAK_DEST} WITHOUT_RPATH_FIX=1
      - make install PREFIX=${FLATPAK_DEST} WITHOUT_RPATH_FIX=1
    sources:
      - type: git
        url: https://github.com/jordansissel/xdotool.git
        tag: v3.20211022.1

  # Python dependencies — generated from requirements.txt by flatpak-pip-generator
  # (flatpak/generate-pip-sources.sh). Regenerate when requirements.txt changes. This
  # replaced the hand-written wheel list, which had invalid URLs and was missing PyQt6
  # and pynput. evdev is intentionally absent (Linux source-build-only — Issue 5).
  - python-deps.json

  # llama-cpp-python - Python bindings for llama.cpp (post-processing)
  # Built from source to use our Vulkan-enabled llama.cpp
  - name: python3-llama-cpp-python
    buildsystem: simple
    build-options:
      env:
        # Use system llama.cpp library we built earlier
        CMAKE_ARGS: "-DGGML_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_AVX512=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF"
        LLAMA_CPP_LIB: "/app/lib/libllama.so"
    build-commands:
      - pip3 install --verbose --no-build-isolation --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/abetlen/llama-cpp-python.git
        tag: v0.3.4

  # Main application
  - name: wayfinder-aura
    buildsystem: simple
    build-commands:
      # Main application files
      - install -Dm755 main.py ${FLATPAK_DEST}/lib/wayfinder-aura/main.py
      - install -Dm644 wayfinder_main.py ${FLATPAK_DEST}/lib/wayfinder-aura/wayfinder_main.py
      
      # trigger_record.py is the only root-level module still present — the recorder/
      # transcriber/injector/postprocessor/license root shims were deleted (code now lives
      # under src/wayfinder/; CLAUDE.md Rule #4). Installing them would fail the build.
      - install -Dm644 trigger_record.py ${FLATPAK_DEST}/lib/wayfinder-aura/trigger_record.py

      # Package structure: mkdir the dest first so `cp -r src/wayfinder .../src/` lands at
      # .../src/wayfinder/ (the launcher puts .../src on PYTHONPATH and imports `wayfinder`).
      # Without the mkdir, cp creates .../src AS the package contents and the import breaks.
      - mkdir -p ${FLATPAK_DEST}/lib/wayfinder-aura/src
      - cp -r src/wayfinder ${FLATPAK_DEST}/lib/wayfinder-aura/src/
      
      # Assets
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/lib/wayfinder-aura/assets/icon.png
      
      # Launcher script
      - install -Dm755 flatpak/wayfinder-aura-launcher.sh ${FLATPAK_DEST}/bin/wayfinder-aura
      
      # Icons at multiple sizes
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.user.WayfinderAura.png
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.user.WayfinderAura.png
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.user.WayfinderAura.png
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/io.github.user.WayfinderAura.png
      
      # Desktop file
      - install -Dm644 flatpak/io.github.user.WayfinderAura.desktop ${FLATPAK_DEST}/share/applications/io.github.user.WayfinderAura.desktop
      
      # AppStream metadata for software centers
      - install -Dm644 flatpak/io.github.user.WayfinderAura.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.user.WayfinderAura.metainfo.xml
    sources:
      - type: dir
        path: ..
