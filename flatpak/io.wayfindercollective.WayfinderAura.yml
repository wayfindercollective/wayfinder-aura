# Flatpak manifest for Wayfinder Aura
# 
# Quick test build:
#   flatpak-builder --user --install --force-clean --jobs=2 build-dir io.wayfindercollective.WayfinderAura.yml
#
# For Flathub submission:
#   1. Push and tag a public release commit
#   2. Generate release/io.wayfindercollective.WayfinderAura.yml with
#      flatpak/prepare-release-manifest.py --tag vX.Y.Z
#   3. Build the release manifest with --force-clean
#   4. Submit the release manifest plus generated python-deps.json to Flathub
#
# App ID Guidelines:
#   - For personal projects: io.github.YOURUSERNAME.WayfinderAura
#   - For organization: com.yourorg.WayfinderAura
#   - Update all references below when changing

app-id: io.wayfindercollective.WayfinderAura
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
# Rust is required to build cryptography / jiter / pydantic-core from sdist
# (Flathub build-from-source; platform wheels are no longer used).
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: wayfinder-aura

cleanup-commands:
  - /app/cleanup-BaseApp.sh

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    BASEAPP_REMOVE_WEBENGINE: '1'
    CARGO_HOME: /run/build/cargo
    # Prefer system OpenSSL when building cryptography from source.
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

finish-args:
  # Display - Wayland preferred, X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  
  # Audio recording (PipeWire/PulseAudio) - essential for voice dictation
  - --socket=pulseaudio
  
  # D-Bus for system integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

  # IPC socket shared with the host-side trigger (KDE shortcut / Steam-Deck R4 button).
  # xdg-run ($XDG_RUNTIME_DIR) is bind-mounted host<->sandbox, so a non-Flatpak host
  # process can reach the AF_UNIX socket the sandboxed app binds at
  # $XDG_RUNTIME_DIR/wayfinder-aura/wayfinder-aura.sock. Sandbox /tmp is private, so the
  # old /tmp socket was unreachable from the host — this is the R4-dictation fix.
  - --filesystem=xdg-run/wayfinder-aura:create

  # Model downloads use Path.home()/.local/share/wayfinder-aura/... which inside
  # Flatpak is already the sandboxed app home (~/.var/app/<app-id>/...). Do NOT
  # grant host ~/.local/share/... — Flathub requires minimized static permissions.
  
  # GPU acceleration (Vulkan for whisper.cpp and llama.cpp)
  - --device=dri
  # RADV VANGOGH (Steam Deck RDNA2) has no matrix cores → ggml-vulkan's
  # cooperative-matrix path is emulated (slow, and it SIGSEGV'd at init on
  # whisper.cpp <=1.7.2). Disabling coopmat makes GPU whisper fast AND stable
  # here; it's a no-op for the CPU-only builds. Required for the v1.9.x GPU path.
  - --env=GGML_VK_DISABLE_COOPMAT=1
  
  # Network for API-based transcription (OpenAI, Groq) and model downloads
  - --share=network

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'
  - /lib/python*/site-packages/pip*
  - /lib/python*/site-packages/setuptools*
  - /lib/python*/site-packages/wheel*

modules:
  # PortAudio for sounddevice
  - name: portaudio
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      # git source, not GitHub's auto-generated tarball — that tarball's sha256 is unstable
      # and broke the build (manifest had ...8c405c8d64db, GitHub served ...40c3e1b83174fa0).
      - type: git
        url: https://github.com/PortAudio/portaudio.git
        tag: v19.7.0
        commit: 147dd722548358763a8b649b3e4b41dfffbcfbb6

  # SPIRV-Headers — build-only dep of ggml-vulkan's shader generator
  # (find_package(SPIRV-Headers)) in whisper.cpp v1.8+ AND llama.cpp b9608. Must
  # build BEFORE the Vulkan whisper modules below. Header-only; installs its cmake
  # config into /app so later modules' find_package resolves. Cleaned from the app.
  - name: spirv-headers
    buildsystem: cmake-ninja
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Headers.git
        tag: vulkan-sdk-1.3.290.0
        commit: 2acb319af38d43be3ea76bfabf3998e5281d8d12

  # whisper.cpp — GPU (Vulkan) transcription engine, the default binary.
  # GGML_VULKAN=ON initializes Vulkan at startup; on hardware/driver combos where
  # that init crashes (it SIGSEGVed on the Deck's RDNA2 — STEAMDECK-INSTALL-LOG
  # reference notes), the APP detects the signal-death of this subprocess and
  # retries with the CPU binary below (transcriber.py auto-fallback, memoized per
  # session). Broken Vulkan on a given machine degrades to CPU silently instead
  # of producing "no output". --device=dri in finish-args exposes the GPU; the
  # runtime GL extensions supply the Vulkan ICDs at runtime.
  - name: whisper-cpp
    buildsystem: cmake-ninja
    # v1.9.x's `ninja install` installs the example binaries (whisper-cli/server)
    # into /app/bin; with two whisper modules that would overwrite GPU<->CPU. Skip
    # install — the post-install below copies each binary under its correct name.
    no-make-install: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DWHISPER_BUILD_EXAMPLES=ON
      - -DWHISPER_BUILD_TESTS=OFF
      - -DBUILD_SHARED_LIBS=OFF
      # Generic CPU baseline: Steam Deck APU (Zen 2) lacks AVX-512; a -march=native
      # build SIGILLs on it (STEAMDECK-INSTALL-LOG.md Crit-Finding 2 / Issue 13).
      - -DGGML_NATIVE=OFF
      - -DGGML_AVX512=OFF
      # v1.9.x ggml builds PURE SCALAR CPU kernels with GGML_NATIVE=OFF unless the
      # instruction sets are enabled explicitly (measured: base.en CPU 2.2s -> 14.5s
      # without these). AVX2/FMA/F16C/BMI2 = the Zen 2 (Deck) baseline; AVX-512 off.
      - -DGGML_SSE42=ON
      - -DGGML_AVX=ON
      - -DGGML_AVX2=ON
      - -DGGML_FMA=ON
      - -DGGML_F16C=ON
      - -DGGML_BMI2=ON
      - -DGGML_VULKAN=ON
    sources:
      - type: git
        url: https://github.com/ggerganov/whisper.cpp.git
        tag: v1.9.1
        commit: f049fff95a089aa9969deb009cdd4892b3e74916
    post-install:
      # whisper.cpp v1.7.2 builds the transcription CLI as bin/main (renamed to whisper-cli
      # only in later releases). Install it under the whisper-cli name the app/config expects.
      # Static build (BUILD_SHARED_LIBS=OFF) so it's standalone — no rpath shim needed (Issue 12).
      - if [ -f bin/whisper-cli ]; then install -Dm755 bin/whisper-cli ${FLATPAK_DEST}/bin/whisper-cli; else install -Dm755 bin/main ${FLATPAK_DEST}/bin/whisper-cli; fi
      # whisper-server (built by WHISPER_BUILD_EXAMPLES=ON) keeps the model resident
      # so dictation is instant. The app warms it at startup and routes through it
      # when whisper_server_mode is on; install it next to whisper-cli (the app
      # derives the server path by name). v1.7.2 builds it as bin/server — the
      # whisper-server rename is a later release; without the elif this install
      # silently skipped and the Flatpak fell back to per-call CLI reloads.
      - if [ -f bin/whisper-server ]; then install -Dm755 bin/whisper-server ${FLATPAK_DEST}/bin/whisper-server; elif [ -f bin/server ]; then install -Dm755 bin/server ${FLATPAK_DEST}/bin/whisper-server; fi

  # whisper.cpp — CPU-only fallback binary for systems where Vulkan is unavailable or unstable.
  # Same source/version as the Vulkan build, installed as whisper-cli-cpu. The app
  # switches to it automatically when the Vulkan binary dies on this machine.
  # base.en on the Deck's Zen 2 CPU is ~2x real-time — an acceptable worst case.
  - name: whisper-cpp-cpu
    buildsystem: cmake-ninja
    no-make-install: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DWHISPER_BUILD_EXAMPLES=ON
      - -DWHISPER_BUILD_TESTS=OFF
      - -DBUILD_SHARED_LIBS=OFF
      - -DGGML_NATIVE=OFF
      - -DGGML_AVX512=OFF
      # v1.9.x ggml builds PURE SCALAR CPU kernels with GGML_NATIVE=OFF unless the
      # instruction sets are enabled explicitly (measured: base.en CPU 2.2s -> 14.5s
      # without these). AVX2/FMA/F16C/BMI2 = the Zen 2 (Deck) baseline; AVX-512 off.
      - -DGGML_SSE42=ON
      - -DGGML_AVX=ON
      - -DGGML_AVX2=ON
      - -DGGML_FMA=ON
      - -DGGML_F16C=ON
      - -DGGML_BMI2=ON
      - -DGGML_VULKAN=OFF
    sources:
      - type: git
        url: https://github.com/ggerganov/whisper.cpp.git
        tag: v1.9.1
        commit: f049fff95a089aa9969deb009cdd4892b3e74916
    post-install:
      - if [ -f bin/whisper-cli ]; then install -Dm755 bin/whisper-cli ${FLATPAK_DEST}/bin/whisper-cli-cpu; else install -Dm755 bin/main ${FLATPAK_DEST}/bin/whisper-cli-cpu; fi
      # CPU whisper-server: the Vulkan-built server crashes at ggml-vulkan
      # LIBRARY INIT — before -ng is honored — on broken-Vulkan devices
      # (observed SIGSEGV on the Deck's RDNA2 in-sandbox), so no flag can save
      # it. The server startup ladder's last resort is this separate CPU-only
      # binary: instant (model-resident) transcription survives even there.
      - if [ -f bin/whisper-server ]; then install -Dm755 bin/whisper-server ${FLATPAK_DEST}/bin/whisper-server-cpu; elif [ -f bin/server ]; then install -Dm755 bin/server ${FLATPAK_DEST}/bin/whisper-server-cpu; fi

  # Bundled whisper model: base.en — the right default for Steam-Deck-class CPU
  # (~141 MB, ~2x real-time on the Zen 2 APU; large-v3-turbo is unusable there —
  # STEAMDECK-INSTALL-LOG.md Issues 11/17). Users can download larger models in-app.
  - name: whisper-model-base
    buildsystem: simple
    build-commands:
      - install -Dm644 ggml-base.en.bin ${FLATPAK_DEST}/share/whisper-models/ggml-base.en.bin
    sources:
      - type: file
        url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
        sha256: a03779c86df3323075f5e796cb2ce5029f00ec8869eee3fdfb897afe36c6d002
        dest-filename: ggml-base.en.bin

  # wtype for Wayland text injection
  - name: wtype
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/atx/wtype.git
        tag: v0.4
        commit: 1c00e68adb202ba3987f60f37451a7201c61005d

  # NOTE: ydotool is intentionally NOT bundled. It injects via /dev/uinput, which a Flatpak
  # sandbox doesn't expose — so it can't work here anyway. Wayland uses wtype, X11 uses
  # xdotool (both bundled); the injector degrades gracefully when ydotool is absent. (Its
  # source build also needs scdoc for man pages, which the SDK lacks — exit 127.)

  # xdotool — injector's preferred X11 backend. The host binary is invisible inside the
  # sandbox, so build it here. X11 dev libs (Xtst/Xext/xkbcommon) come from the SDK.
  - name: xdotool
    buildsystem: simple
    build-commands:
      - make PREFIX=${FLATPAK_DEST} WITHOUT_RPATH_FIX=1
      - make install PREFIX=${FLATPAK_DEST} WITHOUT_RPATH_FIX=1
    sources:
      - type: git
        url: https://github.com/jordansissel/xdotool.git
        tag: v3.20211022.1
        commit: eb489de1b4fb3fd0cd935d68ae16ecd4c653ac7d

  # Python dependencies, installed from generated SHA256-pinned sources. PyQt6 itself comes
  # from com.riverbankcomputing.PyQt.BaseApp above; regenerate with generate-pip-sources.sh.
  - python-deps.json

  # Tcl/Tk 8.6.14 built WITH Xft. The runtime does not ship Python's tkinter
  # binding, and the Tk available in lean runtimes is commonly built without Xft.
  # Without Xft, Tk falls back to the X core "fixed" bitmap font and renders UI
  # symbols as literal \uXXXX escapes. Build Xft-enabled Tcl/Tk first; the next
  # module adds CPython's tkinter package and links _tkinter against these libs.
  - name: tcl
    buildsystem: simple
    # Tcl/Tk install their .so files read-only. flatpak-builder may still revisit
    # those files during later module strip passes, so make them user-writable
    # after install while also skipping Tcl/Tk debuginfo extraction here.
    build-options:
      no-debuginfo: true
    build-commands:
      - cd unix && ./configure --prefix=/app --enable-threads && make -j${FLATPAK_BUILDER_N_JOBS:-2} && make install && find ${FLATPAK_DEST}/lib -type f \( -name 'libtcl*.so*' -o -name 'libitcl*.so*' -o -name 'libtdbc*.so*' -o -name 'libsqlite*.so*' -o -name 'libthread*.so*' \) -exec chmod u+w {} +
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tcl8.6.14-src.tar.gz
        sha256: 5880225babf7954c58d4fb0f5cf6279104ce1cd6aa9b71e9a6322540e1c4de66

  - name: tk
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      # --enable-xft is the whole point (SDK ships Xft 2.3.9 / fontconfig 2.15.0 / Xrender).
      - cd unix && ./configure --prefix=/app --with-tcl=/app/lib --enable-threads --enable-xft && make -j${FLATPAK_BUILDER_N_JOBS:-2} && make install && find ${FLATPAK_DEST}/lib -type f -name 'libtk*.so*' -exec chmod u+w {} +
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tk8.6.14-src.tar.gz
        sha256: 8ffdb720f47a6ca6107eac2dd877e30b0ef7fac14f3a84ebbd0b3612cee41a94

  # CPython's tkinter stdlib package plus the _tkinter extension. The KDE/PyQt
  # runtime Python does not include tkinter, but customtkinter imports it at
  # startup. Build only the small binding layer against the Tcl/Tk module above.
  - name: python-tkinter
    buildsystem: simple
    build-commands:
      - |
        set -e
        PYVER="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
        SITE="${FLATPAK_DEST}/lib/python${PYVER}/site-packages"
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX"))')"
        mkdir -p "${SITE}"
        cp -r Lib/tkinter "${SITE}/"
        gcc -shared -fPIC Modules/_tkinter.c \
          -o "${SITE}/_tkinter${EXT_SUFFIX}" \
          $(python3-config --includes) \
          -DPy_BUILD_CORE_MODULE \
          -I./Include -I./Include/internal -I./Modules -I/app/include \
          -L/app/lib -Wl,-rpath,/app/lib -ltk8.6 -ltcl8.6
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.13.14/Python-3.13.14.tar.xz
        sha256: 639e43243c620a308f968213df9e00f2f8f62332f7adbaa7a7eeb9783057c690

  # llama.cpp — local LLM post-processing (tone cleanup) via the llama-simple
  # subprocess. GPU (Vulkan) build with a CPU twin + runtime GPU->CPU fallback
  # (see the long note below). NOT the resident llama-cpp-python path the
  # from-source install uses — measured in this sandbox on a Ryzen 9600X:
  #   - llama-simple (this build): 1.4s per cleanup INCLUDING model load,
  #     zero idle RAM (the ~1.1GB model is only in memory during the call —
  #     matters on a 16GB Steam Deck running a game).
  #   - llama-cpp-python 0.3.20/0.3.28 resident at the same AVX2 baseline:
  #     1.7-3.6s per cleanup (older vendored ggml; ~80-150 tok/s prompt eval
  #     vs ~300 here) while holding 1.1GB resident. Slower AND hungrier.
  #     (GGML_CPU_ALL_VARIANTS runtime dispatch would fix the speed, but the
  #     wheel build doesn't package the variant backends — load fails.)
  # Future instant path: bundle llama-server with cache_prompt (KV reuse of the
  # shared tone-guidance prefix), mirroring the whisper-server architecture.
  # GPU (GGML_VULKAN=ON) + a CPU twin (llama-simple-cpu, the next module): the
  # post-processor now has a GPU->CPU auto-fallback (postprocessor.py
  # _subprocess_target — a one-time 16-token GPU probe; a Vulkan crash or the
  # ~1 tok/s "radv not conformant" degradation routes cleanup to llama-simple-cpu).
  # That fallback is what makes shipping a Vulkan llama SAFE: broken-Vulkan hosts
  # (e.g. an older Steam Deck Mesa) fall back to CPU instead of the old
  # 60s-hang-per-dictation. A Vulkan build can SIGSEGV at ggml-vulkan init even with
  # -ngl 0, so the CPU fallback needs its OWN binary (the llama-simple-cpu twin) —
  # exactly like whisper-server-cpu.
  # Instruction sets MUST be enabled explicitly: modern ggml with GGML_NATIVE=OFF
  # builds pure SCALAR kernels (no SSE/AVX at all — measured 25-40x slower, 29s
  # per cleanup). AVX2/FMA/F16C/BMI2 is the Zen 2 (Deck) baseline = any x86-64
  # CPU from ~2013+; AVX-512 stays off (Zen 2 lacks it, SIGILL).
  # Built as a single ninja target (not the full cmake-ninja buildsystem): a full
  # build links ~380 targets including the unified `llama` app, whose link line
  # requires llama-server-impl/llama-cli-impl even with LLAMA_BUILD_SERVER=OFF —
  # an upstream target-dependency bug at this tag. We only need llama-simple.
  - name: llama-cpp
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_EXAMPLES=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_CURL=OFF -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF -DGGML_VULKAN=ON -DGGML_SSE42=ON -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_BMI2=ON -DGGML_AVX512=OFF
      - cmake --build build --target llama-simple --parallel ${FLATPAK_BUILDER_N_JOBS:-2}
      # The app's CLI backend prefers llama-simple (stable echo+generation stdout
      # format its extraction is built around); config defaults to /app/bin/llama-simple
      # inside the sandbox (config.py IS_FLATPAK branch). This is the Vulkan build —
      # the post-processor probes it and falls back to llama-simple-cpu if GPU is bad.
      - install -Dm755 build/bin/llama-simple ${FLATPAK_DEST}/bin/llama-simple
    sources:
      - type: git
        url: https://github.com/ggml-org/llama.cpp.git
        tag: b9608
        commit: 70b54e140c90a92285ba699d77e1e32e0868a0e2

  # CPU twin of llama-cpp — the GPU->CPU fallback target (postprocessor.py
  # _subprocess_target). Same source/SIMD flags, Vulkan OFF, installed as
  # llama-simple-cpu. Needed as a SEPARATE binary because a Vulkan build can
  # SIGSEGV at ggml-vulkan init even with -ngl 0 (mirrors whisper-server-cpu).
  - name: llama-cpp-cpu
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_EXAMPLES=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_CURL=OFF -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF -DGGML_VULKAN=OFF -DGGML_SSE42=ON -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_BMI2=ON -DGGML_AVX512=OFF
      - cmake --build build --target llama-simple --parallel ${FLATPAK_BUILDER_N_JOBS:-2}
      - install -Dm755 build/bin/llama-simple ${FLATPAK_DEST}/bin/llama-simple-cpu
    sources:
      - type: git
        url: https://github.com/ggml-org/llama.cpp.git
        tag: b9608
        commit: 70b54e140c90a92285ba699d77e1e32e0868a0e2


  # Main application
  - name: wayfinder-aura
    buildsystem: simple
    build-commands:
      # Main application files
      - install -Dm755 main.py ${FLATPAK_DEST}/lib/wayfinder-aura/main.py
      - install -Dm644 wayfinder_main.py ${FLATPAK_DEST}/lib/wayfinder-aura/wayfinder_main.py
      
      # trigger_record.py is the only root-level module still present — the recorder/
      # transcriber/injector/postprocessor/license root shims were deleted (code now lives
      # under src/wayfinder/; CLAUDE.md Rule #4). Installing them would fail the build.
      - install -Dm644 trigger_record.py ${FLATPAK_DEST}/lib/wayfinder-aura/trigger_record.py

      # Package structure: mkdir the dest first so `cp -r src/wayfinder .../src/` lands at
      # .../src/wayfinder/ (the launcher puts .../src on PYTHONPATH and imports `wayfinder`).
      # Without the mkdir, cp creates .../src AS the package contents and the import breaks.
      - mkdir -p ${FLATPAK_DEST}/lib/wayfinder-aura/src
      - cp -r src/wayfinder ${FLATPAK_DEST}/lib/wayfinder-aura/src/
      
      # Assets
      - install -Dm644 assets/icon.png ${FLATPAK_DEST}/lib/wayfinder-aura/assets/icon.png
      # Tinted line-icon set (see src/wayfinder/ui/icons.py)
      - mkdir -p ${FLATPAK_DEST}/lib/wayfinder-aura/assets/icons
      - install -Dm644 assets/icons/*.png -t ${FLATPAK_DEST}/lib/wayfinder-aura/assets/icons/

      # Launcher script
      - install -Dm755 flatpak/wayfinder-aura-launcher.sh ${FLATPAK_DEST}/bin/wayfinder-aura
      
      # Icons at multiple sizes — resized from the 2048px source via Pillow (installed by the
      # python-deps module). flatpak export rejects icons >512px, so we can't install the
      # source verbatim (STEAMDECK-INSTALL-LOG: first build failed exactly here).
      - PYTHONPATH="$(ls -d ${FLATPAK_DEST}/lib/python3*/site-packages | head -1)" python3 flatpak/resize-icons.py ${FLATPAK_DEST}
      
      # Desktop file
      - install -Dm644 flatpak/io.wayfindercollective.WayfinderAura.desktop ${FLATPAK_DEST}/share/applications/io.wayfindercollective.WayfinderAura.desktop
      
      # AppStream metadata for software centers
      - install -Dm644 flatpak/io.wayfindercollective.WayfinderAura.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.wayfindercollective.WayfinderAura.metainfo.xml
    sources:
      - type: dir
        path: ..
