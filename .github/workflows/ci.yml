name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Runtime Syntax Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run high-signal Ruff checks
        run: |
          # The repo predates a formatting baseline, so CI currently gates the
          # runtime-breaking classes that must never ship. A full style ratchet
          # should come in a dedicated formatting-only change.
          ruff check --output-format=github --select F821,F823,F722,E9 .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests

      - name: Run mypy
        run: mypy src/wayfinder --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Don't fail CI on type errors initially

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # python3-tk / portaudio: app deps
          # libegl1 + GL stack: PyQt6 QtGui imports (overlay tests) need libEGL.so.1
          sudo apt-get install -y python3-tk portaudio19-dev \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-timeout
          pip install -e ".[dev]" || pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src/wayfinder --cov-report=xml -m "not ui and not slow and not network and not perf"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  structure-check:
    name: Structure Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify project structure
        run: |
          python scripts/verify_structure.py
        continue-on-error: true

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Skip non-tag release check
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        run: echo "Release readiness check only runs for version tags and manual artifact builds."

      - name: Verify production license defaults
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: python scripts/ci/check-release-license-defaults.py

      - name: Install storefront browser checker
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Verify storefront readiness
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: python scripts/ci/check-storefront-readiness.py --browser --timeout 30

      - name: Verify release manifest can be generated
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python flatpak/prepare-release-manifest.py \
            --tag "${GITHUB_REF_NAME}" \
            --output /tmp/wayfinder-flathub/io.wayfindercollective.WayfinderAura.yml

  build-pyinstaller:
    name: Build (PyInstaller)
    runs-on: ubuntu-latest
    needs: [lint, release-readiness]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk portaudio19-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller wayfinder-aura.spec --clean
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfinder-aura-linux
          path: dist/wayfinder-aura
          retention-days: 7

  build-appimage:
    name: Build (AppImage)
    # Pin the AppImage build to an older glibc baseline for wider distro
    # compatibility. Keep the other CI jobs on ubuntu-latest.
    runs-on: ubuntu-22.04
    needs: [lint, release-readiness]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk portaudio19-dev \
            cmake make g++ git \
            libvulkan-dev vulkan-tools \
            ydotool wtype \
            libfuse2 desktop-file-utils appstream

      - name: Install glslc for Vulkan builds
        run: scripts/ci/install-glslc-if-needed.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build full AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          ./scripts/build-appimage.sh --full

      - name: Smoke-test AppImage contents
        run: |
          ./Wayfinder_Aura-*.AppImage --appimage-extract >/tmp/wayfinder-appimage-extract.log
          test -x squashfs-root/AppRun
          test -x squashfs-root/usr/bin/wayfinder-aura
          test -x squashfs-root/usr/bin/whisper-cli
          test -x squashfs-root/usr/bin/llama-cli
          test -x squashfs-root/usr/bin/llama-simple
          test -x squashfs-root/usr/bin/wtype
          test -x squashfs-root/usr/bin/ydotool
          desktop-file-validate squashfs-root/io.wayfindercollective.WayfinderAura.desktop
          appstreamcli validate --no-net squashfs-root/usr/share/metainfo/io.wayfindercollective.WayfinderAura.metainfo.xml

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfinder-aura-appimage
          path: |
            Wayfinder_Aura-*.AppImage
            Wayfinder_Aura-*.AppImage.zsync
          retention-days: 14

  # Flatpak build (optional, requires flatpak-builder)
  build-flatpak:
    name: Build (Flatpak)
    runs-on: ubuntu-latest
    needs: [lint, release-readiness]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak
          # Use Flathub's Builder app (current flatpak-builder) so SDK extensions
          # resolve against Freedesktop 25.08 for KDE 6.10, not a stale host builder.
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.flatpak.Builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK
        run: |
          # KDE 6.10 → Freedesktop 25.08; rust-stable is required for sdist builds of
          # cryptography / jiter / pydantic-core.
          flatpak install --user -y flathub \
            org.kde.Platform//6.10 \
            org.kde.Sdk//6.10 \
            com.riverbankcomputing.PyQt.BaseApp//6.10 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Select Flatpak manifest
        id: flatpak-manifest
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            python3 flatpak/prepare-release-manifest.py \
              --tag "$GITHUB_REF_NAME" \
              --output flatpak/release/io.wayfindercollective.WayfinderAura.yml
            echo "manifest=release/io.wayfindercollective.WayfinderAura.yml" >> "$GITHUB_OUTPUT"
          else
            echo "manifest=io.wayfindercollective.WayfinderAura.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Flatpak
        run: |
          cd flatpak
          # SDKs/extensions are pre-installed above. Do not use --install-deps-from
          # inside org.flatpak.Builder (D-Bus install fails headless).
          # Talk to host flatpak so the builder sees user-installed SDKs.
          flatpak run --command=flatpak-builder \
            --filesystem="$PWD":rw \
            --filesystem=home \
            --socket=session-bus \
            --talk-name=org.freedesktop.Flatpak \
            --env=FLATPAK_USER_DIR="$HOME/.local/share/flatpak" \
            org.flatpak.Builder \
            --user --force-clean --jobs=2 \
            --repo=repo build-dir "${{ steps.flatpak-manifest.outputs.manifest }}"

      - name: Build single-file bundle
        run: |
          cd flatpak
          flatpak build-bundle repo io.wayfindercollective.WayfinderAura.flatpak \
            io.wayfindercollective.WayfinderAura master \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfinder-aura-flatpak
          path: flatpak/io.wayfindercollective.WayfinderAura.flatpak
          retention-days: 14

  # Release job (only on tags)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test, release-readiness, build-pyinstaller, build-appimage, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download PyInstaller artifact
        uses: actions/download-artifact@v4
        with:
          name: wayfinder-aura-linux
          path: dist/

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: wayfinder-aura-appimage
          path: dist/

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: wayfinder-aura-flatpak
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wayfinder-aura
            dist/Wayfinder_Aura-*.AppImage
            dist/Wayfinder_Aura-*.AppImage.zsync
            dist/io.wayfindercollective.WayfinderAura.flatpak
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
